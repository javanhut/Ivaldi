name: Release

# Cuts signed, multi-architecture binaries when the maintainer publishes a
# GitHub release. Releases are maintainer-determined (see VERSIONING.md):
# nothing here runs on a normal push — only on a published release.
on:
  release:
    types: [published]

permissions:
  contents: write   # attach assets to the release
  id-token: write   # OIDC identity for keyless (Sigstore) signing

env:
  CARGO_TERM_COLOR: always
  BIN: ivaldi

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux — static musl, portable across distros. Built natively per arch.
          - { target: x86_64-unknown-linux-musl,  os: ubuntu-latest,    slug: linux-x86_64 }
          - { target: aarch64-unknown-linux-musl, os: ubuntu-24.04-arm, slug: linux-arm64 }
          # macOS — native on each arch.
          - { target: x86_64-apple-darwin,        os: macos-13,         slug: macos-x86_64 }
          - { target: aarch64-apple-darwin,       os: macos-14,         slug: macos-arm64 }
          # Windows — native on each arch.
          - { target: x86_64-pc-windows-msvc,     os: windows-latest,   slug: windows-x86_64 }
          - { target: aarch64-pc-windows-msvc,    os: windows-11-arm,   slug: windows-arm64 }
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install musl toolchain
        if: endsWith(matrix.target, '-musl')
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Build
        run: cargo build --release --locked --target ${{ matrix.target }}

      - name: Package (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          dist="${BIN}-${{ github.event.release.tag_name }}-${{ matrix.slug }}"
          rel="target/${{ matrix.target }}/release"
          strip "${rel}/${BIN}" || true
          tar -czf "${dist}.tar.gz" -C "${rel}" "${BIN}"
          echo "ASSET=${dist}.tar.gz" >> "$GITHUB_ENV"

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $dist = "$env:BIN-${{ github.event.release.tag_name }}-${{ matrix.slug }}"
          $bin  = "target/${{ matrix.target }}/release/$env:BIN.exe"
          Compress-Archive -Path $bin -DestinationPath "$dist.zip"
          "ASSET=$dist.zip" | Out-File -Encoding ascii -Append $env:GITHUB_ENV

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign artifact (keyless)
        shell: bash
        run: |
          set -euo pipefail
          cosign sign-blob --yes \
            --bundle "${ASSET}.cosign.bundle" \
            "${ASSET}"

      - name: Attach to release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ env.ASSET }}
            ${{ env.ASSET }}.cosign.bundle

  # Once every archive is attached, produce a single signed checksums file
  # covering all six artifacts.
  checksums:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download release archives
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release download "${{ github.event.release.tag_name }}" \
            --repo "${{ github.repository }}" \
            --pattern '*.tar.gz' --pattern '*.zip'

      - name: Generate SHA256SUMS
        run: sha256sum *.tar.gz *.zip | tee SHA256SUMS

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign checksums (keyless)
        run: cosign sign-blob --yes --bundle SHA256SUMS.cosign.bundle SHA256SUMS

      - name: Attach to release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            SHA256SUMS
            SHA256SUMS.cosign.bundle
